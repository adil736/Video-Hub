<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Video Hub</title>
<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial;}
.header{background:#000;padding:15px;text-align:center;color:red;font-size:24px;}
.topbar{display:flex;gap:10px;padding:10px;background:#1a1a1a;}
.topbar input{flex:1;padding:8px;border:none;border-radius:5px;}
.topbar select{padding:8px;background:#000;color:white;border:none;}
.container{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:10px;}
.video{background:#1c1c1c;border-radius:8px;overflow:hidden;cursor:pointer;}
.video img{width:100%;}
.title{padding:6px;font-size:13px;}
.playerBox{display:none;padding:20px;text-align:center;}
iframe{width:90%;height:250px;border:none;}
.btn{background:red;color:white;padding:10px 20px;margin-top:10px;display:inline-block;text-decoration:none;}
.ad{background:#222;padding:10px;text-align:center;margin:10px;}
</style>
</head>
<body>

<div class="header">🔥 PRO VIDEO HUB</div>

<div class="topbar">
<input type="text" id="search" placeholder="Search...">
<select id="cat">
<option value="all">All</option>
<option value="anime">Anime</option>
<option value="viral">Viral</option>
<option value="movies">Movies</option>
</select>
</div>

<div class="ad">ADSTERRA AD HERE</div>

<div class="container" id="list"></div>

<!-- PLAYER -->
<div class="playerBox" id="playerBox">
<h2 id="videoTitle"></h2>
<iframe id="player"></iframe>
<br>
<button class="btn" onclick="start()">Watch / Download</button>
<div id="timer"></div>
<a id="getLink" class="btn" style="display:none;" target="_blank">Get Link</a>
<div class="ad">ADSTERRA BANNER HERE</div>
</div>

];

// LOAD VIDEOS
function load(){
let s=document.getElementById("search").value.toLowerCase();
let c=document.getElementById("cat").value;
let out="";
videos.forEach((v,i)=>{
if((c=="all"||v.cat==c) && v.title.toLowerCase().includes(s)){
out+=`<div class="video" onclick="openVideo(${i})">
<img src="${v.img}"><div class="title">${v.title}</div></div>`;
}
});
document.getElementById("list").innerHTML=out;
}

load();
document.getElementById("search").onkeyup=load;
document.getElementById("cat").onchange=load;

// OPEN VIDEO
function openVideo(i){
let v=videos[i];
document.getElementById("playerBox").style.display="block";
document.getElementById("player").src=v.preview;
document.getElementById("videoTitle").innerText=v.title;
window.finalLink=v.link;
window.scrollTo(0,document.body.scrollHeight);
}

// TIMER
function start(){
let t=10;
let timer=document.getElementById("timer");
let x=setInterval(()=>{
t--;
timer.innerHTML="Wait "+t+" sec";
if(t<=0){
clearInterval(x);
let btn=document.getElementById("getLink");
btn.style.display="inline-block";
btn.href=window.finalLink;
timer.innerHTML="Ready!";
}
},1000);
}
</script>
</body>
</html>
